name: college_staff_directory
description: College Staff Directory Application for students and staff
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- CORE & STATE ---
  provider: ^6.1.1
  go_router: ^12.1.1
  intl: ^0.18.1
  uuid: ^4.2.2

  # --- COMMUNICATION & EXTERNAL LINKS ---
  # Crucial for: WhatsApp, Email, LinkedIn, and Vidwan Profiles
  url_launcher: ^6.2.2
  font_awesome_flutter: ^10.7.0 

  # --- DATA STORAGE ---
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # --- NETWORKING & API ---
  http: ^1.1.2
  dio: ^5.4.0

  # --- UI & ANIMATIONS ---
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^2.7.0
  flutter_staggered_animations: ^1.1.1
  flutter_slidable: ^3.0.1
  badges: ^3.1.2

  # --- SPECIALIZED COMPONENTS ---
  flutter_rating_bar: ^4.0.1
  fl_chart: ^0.65.0
  fuzzy: ^0.5.1
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  # Ensure your staff.json and any other data files are found here
  assets:
    - assets/data/
    # - assets/images/
    # - assets/animations/
    